<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Segment Editor – Pits n' Giggles</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    @keyframes segbounce {
      0%   { transform: scale(1.04);  box-shadow: 0 0 0 2px #ef4444, 0 0 40px rgba(239,68,68,0.7); }
      45%  { transform: scale(1.018); box-shadow: 0 0 0 2px #ef4444, 0 0 20px rgba(239,68,68,0.4); }
      100% { transform: scale(1);     box-shadow: 0 0 0 0 transparent; }
    }
    @keyframes segflash {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }
    .seg-moving {
      animation: segbounce 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }
    .seg-flash-overlay {
      background: linear-gradient(135deg, rgba(220,38,38,0.4) 0%, rgba(220,38,38,0.18) 100%);
      animation: segflash 0.75s ease-out forwards;
    }
    @keyframes headerSlideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .header-fields-enter {
      animation: headerSlideDown 0.18s ease-out forwards;
    }
  </style>
</head>
<body class="bg-black text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useReducer, useRef, useEffect } = React;

    // ─── Helpers ────────────────────────────────────────────────────────────────

    let _counter = 0;
    function makeId() { return `seg_${++_counter}_${Math.random().toString(36).slice(2,7)}`; }

    function makeSegment(prevEndM = 0, type = "corner") {
      return {
        _id: makeId(),
        type,
        name: "",
        start_m: prevEndM,
        end_m: prevEndM + 100,
        corner_number: "",
        corner_numbers_raw: "",
      };
    }

    function parseCornerNumbers(raw) {
      return raw.split(",").map(s => s.trim()).filter(s => s !== "").map(Number);
    }

    function isIncreasingConsecutive(nums) {
      if (!Array.isArray(nums) || nums.length === 0) return false;
      for (let i = 1; i < nums.length; i++) {
        if (nums[i] !== nums[i - 1] + 1) return false;
      }
      return true;
    }

    // ─── Validation ─────────────────────────────────────────────────────────────

    function validateSectors(sectorsEnabled, s1, s2, trackLength) {
      if (!sectorsEnabled) return {};
      const errors = {};
      const s1n = Number(s1);
      const s2n = Number(s2);
      const tl = Number(trackLength);
      const hasTrackLen = trackLength !== "" && !isNaN(tl) && tl > 0;

      if (s1 === "" || isNaN(s1n)) {
        errors.s1 = "Required";
      } else if (!Number.isInteger(s1n)) {
        errors.s1 = "Must be an integer";
      } else if (s1n <= 0) {
        errors.s1 = "Must be > 0";
      }

      if (s2 === "" || isNaN(s2n)) {
        errors.s2 = "Required";
      } else if (!Number.isInteger(s2n)) {
        errors.s2 = "Must be an integer";
      } else if (!errors.s1 && s2n <= s1n) {
        errors.s2 = "Must be > S1";
      }

      if (hasTrackLen && !errors.s2 && s2n >= tl) {
        errors.s2 = `Must be < track_length (${tl})`;
      }

      return errors;
    }

    function validate(segments, trackLength = "") {
      const trackLen = Number(trackLength);
      const hasValidTrackLen = trackLength !== "" && !isNaN(trackLen) && trackLen > 0;
      const errors = {};
      segments.forEach((seg, i) => {
        const e = {};
        if (seg.type === "straight" && !seg.name.trim()) {
          e.name = "Required";
        }
        if (seg.start_m === "" || isNaN(Number(seg.start_m))) e.start_m = "Required";
        if (seg.end_m   === "" || isNaN(Number(seg.end_m)))   e.end_m   = "Required";
        if (!e.start_m && !e.end_m && Number(seg.start_m) >= Number(seg.end_m)) {
          e.end_m = "Must be greater than start_m";
        }
        if (seg.type === "corner" && (seg.corner_number === "" || isNaN(Number(seg.corner_number)))) {
          e.corner_number = "Required";
        }
        if (seg.type === "complex_corner") {
          const nums = parseCornerNumbers(seg.corner_numbers_raw);
          if (nums.length === 0)                                      e.corner_numbers = "Required, non-empty";
          else if (nums.some(n => !Number.isInteger(n) || isNaN(n))) e.corner_numbers = "All values must be integers";
          else if (!isIncreasingConsecutive(nums))                    e.corner_numbers = "Must be increasing and consecutive (e.g. 5,6,7)";
        }
        if (i > 0 && !e.start_m) {
          const prev = segments[i - 1];
          if (prev.end_m !== "" && !isNaN(Number(prev.end_m)) && Number(seg.start_m) < Number(prev.end_m)) {
            e.start_m = `Overlaps previous segment (prev end: ${prev.end_m})`;
          }
        }
        if (hasValidTrackLen && !e.start_m && Number(seg.start_m) < 0) {
          e.start_m = "Must be \u2265 0";
        }
        if (hasValidTrackLen && !e.end_m && Number(seg.end_m) > trackLen) {
          e.end_m = `Must be \u2264 track_length (${trackLen})`;
        }
        if (Object.keys(e).length > 0) errors[seg._id] = e;
      });
      return errors;
    }

    // ─── Reverse Track Generation ────────────────────────────────────────────────

    function generateReverseTrack(trackData, newName, newNumber) {
      const trackLen = trackData.track_length;
      const segs = [...trackData.segments].sort((a, b) => a.start_m - b.start_m);

      for (const seg of segs) {
        if (seg.start_m < 0 || seg.end_m > trackLen || seg.start_m >= seg.end_m) {
          throw new Error(`Segment "${seg.name || seg.type}" (${seg.start_m}–${seg.end_m}) is out of bounds or invalid.`);
        }
      }
      for (const seg of segs) {
        if (seg.type !== "complex_corner") continue;
        if (!Array.isArray(seg.corner_numbers) || seg.corner_numbers.length === 0) {
          throw new Error(`Complex corner "${seg.name || seg.type}" must have a non-empty corner_numbers array.`);
        }
        if (seg.corner_numbers.some(n => !Number.isInteger(n) || isNaN(n))) {
          throw new Error(`Complex corner "${seg.name || seg.type}" must use integer corner numbers.`);
        }
        if (!isIncreasingConsecutive(seg.corner_numbers)) {
          throw new Error(`Complex corner "${seg.name || seg.type}" must use increasing consecutive turn numbers.`);
        }
      }
      for (let i = 1; i < segs.length; i++) {
        if (segs[i].start_m < segs[i - 1].end_m) {
          throw new Error(`Segments overlap near ${segs[i - 1].end_m}m.`);
        }
      }

      let lastTurnNumber = 0;
      for (const seg of segs) {
        if (seg.type === "corner") lastTurnNumber = Math.max(lastTurnNumber, seg.corner_number);
        if (seg.type === "complex_corner") {
          for (const n of seg.corner_numbers) lastTurnNumber = Math.max(lastTurnNumber, n);
        }
      }

      const reversed = segs
        .map(seg => {
          const newSeg = { ...seg, start_m: trackLen - seg.end_m, end_m: trackLen - seg.start_m };
          if (lastTurnNumber > 0) {
            if (seg.type === "corner") {
              newSeg.corner_number = lastTurnNumber + 1 - seg.corner_number;
            } else if (seg.type === "complex_corner") {
              newSeg.corner_numbers = seg.corner_numbers.map(n => lastTurnNumber + 1 - n).reverse();
            }
          }
          return newSeg;
        })
        .reverse();

      return {
        circuit_name: newName,
        circuit_number: Number(newNumber),
        track_length: trackLen,
        segments: reversed,
      };
    }

    // ─── Export / Import ─────────────────────────────────────────────────────────

    function exportSegment(seg) {
      const out = { type: seg.type, start_m: Number(seg.start_m), end_m: Number(seg.end_m) };
      if (seg.type === "straight") out.name = seg.name.trim();
      if (seg.type === "corner") {
        out.name = seg.name.trim();
        out.corner_number = Number(seg.corner_number);
      }
      if (seg.type === "complex_corner") {
        if (seg.name.trim()) out.name = seg.name.trim();
        out.corner_numbers = parseCornerNumbers(seg.corner_numbers_raw);
      }
      return out;
    }

    function importSegment(seg) {
      return {
        _id: makeId(),
        type: seg.type,
        name: seg.name || "",
        start_m: seg.start_m ?? "",
        end_m: seg.end_m ?? "",
        corner_number: seg.corner_number ?? "",
        corner_numbers_raw: Array.isArray(seg.corner_numbers) ? seg.corner_numbers.join(", ") : "",
      };
    }

    function validateLoadedData(data) {
      if (typeof data !== "object" || data === null) return "Root must be an object";
      if (typeof data.circuit_name !== "string" || !data.circuit_name.trim()) return "circuit_name must be a non-empty string";
      if (typeof data.circuit_number !== "number") return "circuit_number must be a number";
      if (!Array.isArray(data.segments)) return "segments must be an array";
      for (let i = 0; i < data.segments.length; i++) {
        const s = data.segments[i];
        if (!["straight", "corner", "complex_corner"].includes(s.type)) {
          return `Segment ${i}: unknown type "${s.type}"`;
        }
      }
      return null;
    }

    const STORAGE_KEY = "track-segment-editor.state.v1";

    function normalizePersistedSegment(seg) {
      const type = ["straight", "corner", "complex_corner"].includes(seg?.type) ? seg.type : "corner";
      return {
        _id: typeof seg?._id === "string" && seg._id ? seg._id : makeId(),
        type,
        name: typeof seg?.name === "string" ? seg.name : "",
        start_m: seg?.start_m ?? "",
        end_m: seg?.end_m ?? "",
        corner_number: seg?.corner_number ?? "",
        corner_numbers_raw: typeof seg?.corner_numbers_raw === "string" ? seg.corner_numbers_raw : "",
      };
    }

    function syncIdCounter(segments) {
      const maxCounter = segments.reduce((max, seg) => {
        const m = /^seg_(\d+)_/.exec(String(seg._id || ""));
        if (!m) return max;
        const n = Number(m[1]);
        return Number.isFinite(n) ? Math.max(max, n) : max;
      }, 0);
      if (maxCounter > _counter) _counter = maxCounter;
    }

    // ─── Reducer ─────────────────────────────────────────────────────────────────

    const initialState = {
      circuitName: "",
      circuitNumber: "",
      trackLength: "",
      segments: [],
      autoAdjust: false,
      errors: {},
      loadModalOpen: false,
      loadedFileName: "",
      needsTrackLength: false,
      sectorsEnabled: false,
      s1: "",
      s2: "",
    };

    function loadInitialState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return initialState;
        const parsed = JSON.parse(raw);
        if (typeof parsed !== "object" || parsed === null) return initialState;

        const segments = Array.isArray(parsed.segments)
          ? parsed.segments.map(normalizePersistedSegment)
          : [];

        syncIdCounter(segments);

        const trackLength = (typeof parsed.trackLength === "string" || typeof parsed.trackLength === "number")
          ? String(parsed.trackLength)
          : "";

        return {
          ...initialState,
          circuitName: typeof parsed.circuitName === "string" ? parsed.circuitName : "",
          circuitNumber: (typeof parsed.circuitNumber === "string" || typeof parsed.circuitNumber === "number")
            ? parsed.circuitNumber
            : "",
          trackLength,
          segments,
          autoAdjust: typeof parsed.autoAdjust === "boolean" ? parsed.autoAdjust : false,
          errors: validate(segments, trackLength),
          sectorsEnabled: typeof parsed.sectorsEnabled === "boolean" ? parsed.sectorsEnabled : false,
          s1: (typeof parsed.s1 === "string" || typeof parsed.s1 === "number") ? String(parsed.s1) : "",
          s2: (typeof parsed.s2 === "string" || typeof parsed.s2 === "number") ? String(parsed.s2) : "",
        };
      } catch (err) {
        console.warn("Failed to restore saved editor state:", err);
        return initialState;
      }
    }

    function reducer(state, action) {
      let segments = state.segments;
      switch (action.type) {
        case "SET_CIRCUIT_NAME":
          return { ...state, circuitName: action.value };
        case "SET_CIRCUIT_NUMBER":
          return { ...state, circuitNumber: action.value };
        case "TOGGLE_AUTO_ADJUST":
          return { ...state, autoAdjust: !state.autoAdjust };
        case "SET_SECTORS_ENABLED":
          return { ...state, sectorsEnabled: action.value };
        case "SET_S1":
          return { ...state, s1: action.value };
        case "SET_S2":
          return { ...state, s2: action.value };

        case "UPDATE_SEGMENT": {
          const { id, field, value } = action;
          let updated = segments.map(s => s._id === id ? { ...s, [field]: value } : s);
          if (state.autoAdjust && field === "end_m" && value !== "") {
            const idx = updated.findIndex(s => s._id === id);
            if (idx !== -1 && idx < updated.length - 1) {
              updated = updated.map((s, i) => i === idx + 1 ? { ...s, start_m: value } : s);
            }
          }
          return { ...state, segments: updated, errors: validate(updated, state.trackLength) };
        }

        case "CHANGE_TYPE": {
          const updated = segments.map(s => s._id !== action.id ? s : {
            _id: s._id, type: action.newType, name: s.name,
            start_m: s.start_m, end_m: s.end_m, corner_number: "", corner_numbers_raw: "",
          });
          return { ...state, segments: updated, errors: validate(updated, state.trackLength) };
        }

        case "INSERT_ABOVE": {
          const idx = segments.findIndex(s => s._id === action.id);
          if (idx === -1) return state;
          const prevEndM = idx > 0 ? (Number(segments[idx-1].end_m) || 0) : 0;
          const updated = [...segments.slice(0, idx), makeSegment(prevEndM), ...segments.slice(idx)];
          return { ...state, segments: updated, errors: validate(updated, state.trackLength) };
        }

        case "INSERT_BELOW": {
          const idx = segments.findIndex(s => s._id === action.id);
          if (idx === -1) return state;
          const updated = [...segments.slice(0, idx+1), makeSegment(Number(segments[idx].end_m)||0), ...segments.slice(idx+1)];
          return { ...state, segments: updated, errors: validate(updated, state.trackLength) };
        }

        case "ADD_FIRST": {
          const newSeg = makeSegment(0);
          return { ...state, segments: [newSeg], errors: validate([newSeg], state.trackLength) };
        }

        case "ADD_LAST": {
          const last = segments[segments.length - 1];
          const newSeg = makeSegment(last ? (Number(last.end_m) || 0) : 0);
          const updated = [...segments, newSeg];
          return { ...state, segments: updated, errors: validate(updated, state.trackLength) };
        }

        case "MOVE_UP": {
          const idx = segments.findIndex(s => s._id === action.id);
          if (idx <= 0) return state;
          const updated = [...segments];
          [updated[idx-1], updated[idx]] = [updated[idx], updated[idx-1]];
          return { ...state, segments: updated, errors: validate(updated, state.trackLength) };
        }

        case "MOVE_DOWN": {
          const idx = segments.findIndex(s => s._id === action.id);
          if (idx === -1 || idx >= segments.length - 1) return state;
          const updated = [...segments];
          [updated[idx], updated[idx+1]] = [updated[idx+1], updated[idx]];
          return { ...state, segments: updated, errors: validate(updated, state.trackLength) };
        }

        case "DELETE": {
          const updated = segments.filter(s => s._id !== action.id);
          return { ...state, segments: updated, errors: validate(updated, state.trackLength) };
        }

        case "LOAD_JSON": {
          const loaded = action.data.segments.map(importSegment);
          const trackLength = action.data.track_length != null ? String(action.data.track_length) : "";
          const loadedSectors = action.data.sectors;
          const hasSectors = loadedSectors != null
            && typeof loadedSectors.s1 === "number"
            && typeof loadedSectors.s2 === "number";
          return {
            ...state,
            circuitName: action.data.circuit_name,
            circuitNumber: action.data.circuit_number,
            trackLength,
            needsTrackLength: trackLength === "",
            segments: loaded,
            errors: validate(loaded, trackLength),
            loadModalOpen: false,
            loadedFileName: action.fileName || "",
            sectorsEnabled: hasSectors,
            s1: hasSectors ? String(loadedSectors.s1) : "",
            s2: hasSectors ? String(loadedSectors.s2) : "",
          };
        }

        case "SET_TRACK_LENGTH": {
          const tl = action.value;
          return { ...state, trackLength: tl, needsTrackLength: false, errors: validate(state.segments, tl) };
        }

        case "CLEAR_NEEDS_TRACK_LENGTH":
          return { ...state, needsTrackLength: false };

        case "NEW":
          return { ...initialState };

        case "OPEN_LOAD_MODAL":
          return { ...state, loadModalOpen: true };

        case "CLOSE_LOAD_MODAL":
          return { ...state, loadModalOpen: false };

        case "APPLY_OFFSET": {
          const { offset, trackLen } = action;
          const updated = segments.map(s => {
            if (s.start_m === "" || s.end_m === "" || isNaN(Number(s.start_m)) || isNaN(Number(s.end_m))) return s;
            const newStart = ((Number(s.start_m) + offset) % trackLen + trackLen) % trackLen;
            const newEnd   = ((Number(s.end_m)   + offset) % trackLen + trackLen) % trackLen;
            return { ...s, start_m: String(+newStart.toFixed(3)), end_m: String(+newEnd.toFixed(3)) };
          });
          return { ...state, segments: updated, errors: validate(updated, state.trackLength) };
        }

        default:
          return state;
      }
    }

    // ─── Components ──────────────────────────────────────────────────────────────

    function FieldError({ msg }) {
      if (!msg) return null;
      return <p className="text-xs text-red-400 mt-0.5">{msg}</p>;
    }

    function inputCls(hasError) {
      return `w-full border rounded px-2 py-1 text-sm bg-zinc-800 text-white placeholder-zinc-500 focus:outline-none focus:ring-1 ${
        hasError ? "border-red-500 focus:ring-red-500" : "border-zinc-600 focus:ring-red-500"
      }`;
    }

    function TypeSpecificFields({ seg, errors, dispatch }) {
      if (seg.type === "corner") {
        return (
          <div className="mt-1.5">
            <label className="block text-xs font-medium text-zinc-500 mb-0.5">
              corner_number <span className="text-red-500">*</span>
            </label>
            <input
              type="number"
              value={seg.corner_number}
              className={`border rounded px-2 py-1 text-sm bg-zinc-800 text-white w-20 focus:outline-none focus:ring-1 ${errors.corner_number ? "border-red-500 focus:ring-red-500" : "border-zinc-600 focus:ring-red-500"}`}
              onChange={e => dispatch({ type: "UPDATE_SEGMENT", id: seg._id, field: "corner_number", value: e.target.value })}
            />
            <FieldError msg={errors.corner_number} />
          </div>
        );
      }

      if (seg.type === "complex_corner") {
        const nums = parseCornerNumbers(seg.corner_numbers_raw);
        return (
          <div className="mt-1.5">
            <label className="block text-xs font-medium text-zinc-500 mb-0.5">
              corner_numbers <span className="text-red-500">*</span>{" "}
              <span className="font-normal text-zinc-600">(comma-separated increasing consecutive integers, e.g. 5,6,7)</span>
            </label>
            <input
              type="text"
              value={seg.corner_numbers_raw}
              placeholder="5,6,7"
              className={inputCls(!!errors.corner_numbers)}
              onChange={e => dispatch({ type: "UPDATE_SEGMENT", id: seg._id, field: "corner_numbers_raw", value: e.target.value })}
            />
            <FieldError msg={errors.corner_numbers} />
          </div>
        );
      }

      return null;
    }

    function offsetDisplay(value, offset, trackLen) {
      const raw = Number(value);
      if (isNaN(raw) || offset === 0 || !trackLen) return null;
      return +( ((raw + offset) % trackLen + trackLen) % trackLen ).toFixed(1);
    }

    function SegmentCard({ seg, segNum, index, total, errors, dispatch, animTick, cardRef, offset, trackLengthNum }) {
      const e = errors[seg._id] || {};
      const hasError = Object.keys(e).length > 0;
      const isMoving = animTick > 0;

      return (
        <div ref={cardRef} className="flex items-start gap-2 mb-1.5">
          {/* Segment number */}
          <div className="flex-shrink-0 w-7 pt-2 text-right">
            <span className="text-zinc-600 text-xs font-mono font-bold">{String(segNum).padStart(2, "0")}</span>
          </div>

          {/* Card */}
          <div
            className={`relative flex-1 rounded-lg border-l-4 overflow-hidden ${isMoving ? "seg-moving" : ""} ${
              hasError ? "border-red-500" : "border-zinc-700"
            }`}
            style={{ backgroundColor: "#1a1a1a" }}
          >
            {isMoving && (
              <div key={animTick} className="seg-flash-overlay absolute inset-0 pointer-events-none z-10 rounded-lg" />
            )}
            <div className="px-3 py-2">
              {/* Grid: row 1 = labels, row 2 = inputs — guarantees perfect alignment */}
              <div className="grid gap-x-2 gap-y-0.5 items-center" style={{ gridTemplateColumns: "auto 1fr 6rem 6rem auto" }}>
                {/* Labels row */}
                <label className="text-xs font-medium text-zinc-500">Type</label>
                <label className="text-xs font-medium text-zinc-500">
                  Name{" "}
                  {seg.type === "straight"
                    ? <span className="text-red-500">*</span>
                    : <span className="font-normal text-zinc-600">(opt)</span>
                  }
                </label>
                <label className="text-xs font-medium text-zinc-500">start_m <span className="text-red-500">*</span></label>
                <label className="text-xs font-medium text-zinc-500">end_m <span className="text-red-500">*</span></label>
                <div />

                {/* Inputs row */}
                <select
                  value={seg.type}
                  className="border border-zinc-600 rounded px-2 py-1 text-sm bg-zinc-800 text-white focus:outline-none focus:ring-1 focus:ring-red-500"
                  onChange={e => dispatch({ type: "CHANGE_TYPE", id: seg._id, newType: e.target.value })}
                >
                  <option value="straight">straight</option>
                  <option value="corner">corner</option>
                  <option value="complex_corner">complex_corner</option>
                </select>
                <input
                  type="text"
                  value={seg.name}
                  className={inputCls(!!e.name)}
                  onChange={ev => dispatch({ type: "UPDATE_SEGMENT", id: seg._id, field: "name", value: ev.target.value })}
                />
                <input
                  type="number"
                  value={seg.start_m}
                  className={inputCls(!!e.start_m)}
                  onChange={ev => dispatch({ type: "UPDATE_SEGMENT", id: seg._id, field: "start_m", value: ev.target.value })}
                />
                <input
                  type="number"
                  value={seg.end_m}
                  className={inputCls(!!e.end_m)}
                  onChange={ev => dispatch({ type: "UPDATE_SEGMENT", id: seg._id, field: "end_m", value: ev.target.value })}
                />
                <div className="flex items-center">
                  {hasError && (
                    <span className="text-xs bg-red-950 text-red-400 px-1.5 py-0.5 rounded-full font-medium border border-red-800">
                      {Object.keys(e).length}!
                    </span>
                  )}
                </div>
              </div>

              {/* Inline field errors */}
              {(e.name || e.start_m || e.end_m) && (
                <div className="flex flex-wrap gap-x-4 mt-0.5">
                  {e.name    && <FieldError msg={`name: ${e.name}`} />}
                  {e.start_m && <FieldError msg={`start: ${e.start_m}`} />}
                  {e.end_m   && <FieldError msg={`end: ${e.end_m}`} />}
                </div>
              )}

              {/* Offset preview */}
              {offset !== 0 && trackLengthNum > 0 && seg.start_m !== "" && seg.end_m !== "" && (() => {
                const ds = offsetDisplay(seg.start_m, offset, trackLengthNum);
                const de = offsetDisplay(seg.end_m,   offset, trackLengthNum);
                if (ds === null || de === null) return null;
                return (
                  <div className="mt-1 text-xs text-amber-400">
                    <span className="text-zinc-500 mr-1">offset view:</span>
                    <span className="font-mono">{ds}m → {de}m</span>
                  </div>
                );
              })()}

              <TypeSpecificFields seg={seg} errors={e} dispatch={dispatch} />
            </div>

            {/* Card footer */}
            <div
              className="border-t px-3 py-1 flex gap-1 flex-wrap text-xs"
              style={{ borderColor: "#2a2a2a", backgroundColor: "#141414" }}
            >
              <button
                onClick={() => dispatch({ type: "MOVE_UP", id: seg._id })}
                disabled={index === 0}
                className="px-2 py-0.5 border border-zinc-700 rounded text-zinc-400 hover:border-red-600 hover:text-red-400 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                title="Move up"
              >
                ↑ Up
              </button>
              <button
                onClick={() => dispatch({ type: "MOVE_DOWN", id: seg._id })}
                disabled={index === total - 1}
                className="px-2 py-0.5 border border-zinc-700 rounded text-zinc-400 hover:border-red-600 hover:text-red-400 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                title="Move down"
              >
                ↓ Down
              </button>
              <span className="border-l border-zinc-700 mx-0.5" />
              <button
                onClick={() => dispatch({ type: "INSERT_ABOVE", id: seg._id })}
                className="px-2 py-0.5 border border-zinc-700 text-zinc-400 rounded hover:border-red-600 hover:text-red-400 transition-colors"
                title="Insert above"
              >
                + Above
              </button>
              <button
                onClick={() => dispatch({ type: "INSERT_BELOW", id: seg._id })}
                className="px-2 py-0.5 border border-zinc-700 text-zinc-400 rounded hover:border-red-600 hover:text-red-400 transition-colors"
                title="Insert below"
              >
                + Below
              </button>
              <span className="border-l border-zinc-700 mx-0.5" />
              <button
                onClick={() => dispatch({ type: "DELETE", id: seg._id })}
                className="px-2 py-0.5 border border-zinc-700 text-zinc-500 rounded hover:border-red-600 hover:text-red-500 transition-colors"
                title="Delete segment"
              >
                <i className="bi bi-trash" />
              </button>
            </div>
          </div>
        </div>
      );
    }

    function LoadModal({ dispatch }) {
      const [text, setText] = useState("");
      const [error, setError] = useState("");
      const fileRef = useRef(null);

      const tryLoad = (jsonStr, fileName = "") => {
        setError("");
        let data;
        try { data = JSON.parse(jsonStr); }
        catch (ex) { setError("Invalid JSON: " + ex.message); return; }
        const err = validateLoadedData(data);
        if (err) { setError(err); return; }
        dispatch({ type: "LOAD_JSON", data, fileName });
      };

      const handleFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => tryLoad(ev.target.result, file.name);
        reader.readAsText(file);
      };

      return (
        <div
          className="fixed inset-0 bg-black/75 flex items-center justify-center z-50"
          onClick={() => dispatch({ type: "CLOSE_LOAD_MODAL" })}
        >
          <div
            className="rounded-xl shadow-2xl p-6 w-full max-w-lg mx-4 border border-zinc-700"
            style={{ backgroundColor: "#1a1a1a" }}
            onClick={e => e.stopPropagation()}
          >
            <h2 className="text-lg font-semibold mb-4 text-white">Load JSON</h2>

            <div className="mb-4">
              <label className="block text-sm text-zinc-400 mb-1">Upload file</label>
              <input
                type="file"
                accept=".json,application/json"
                ref={fileRef}
                onChange={handleFile}
                className="text-sm text-zinc-400"
              />
            </div>

            <div className="mb-4">
              <label className="block text-sm text-zinc-400 mb-1">Or paste JSON</label>
              <textarea
                value={text}
                onChange={e => { setText(e.target.value); setError(""); }}
                rows={8}
                spellCheck={false}
                className="w-full border border-zinc-600 rounded px-3 py-2 text-sm font-mono bg-zinc-900 text-white placeholder-zinc-600 focus:outline-none focus:ring-1 focus:ring-red-500"
                placeholder={'{"circuit_name": "Monza", "circuit_number": 1, "segments": [...]}'}
              />
            </div>

            {error && (
              <div className="mb-3 text-sm text-red-400 bg-red-950 border border-red-800 rounded px-3 py-2">
                {error}
              </div>
            )}

            <div className="flex justify-end gap-2">
              <button
                onClick={() => dispatch({ type: "CLOSE_LOAD_MODAL" })}
                className="px-4 py-2 border border-zinc-600 rounded text-sm text-zinc-300 hover:border-zinc-400 transition-colors"
              >
                Cancel
              </button>
              <button
                onClick={() => tryLoad(text)}
                className="px-4 py-2 bg-red-600 text-white rounded text-sm hover:bg-red-700 transition-colors font-medium"
              >
                Load
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── App-level Modal & Toast ─────────────────────────────────────────────────

    function AppModal({ state }) {
      const [inputVal, setInputVal] = useState(state?.defaultValue ?? "");
      useEffect(() => { setInputVal(state?.defaultValue ?? ""); }, [state?.id]);
      if (!state) return null;
      const isPrompt = state.type === "prompt";
      const isConfirm = state.type === "confirm";
      return (
        <div className="fixed inset-0 bg-black/75 flex items-center justify-center z-50"
          onClick={isPrompt || isConfirm ? state.onCancel : state.onConfirm}>
          <div className="rounded-xl shadow-2xl p-6 w-full max-w-sm mx-4 border border-zinc-700"
            style={{ backgroundColor: "#1a1a1a" }} onClick={e => e.stopPropagation()}>
            {state.title && <h2 className="text-base font-semibold mb-2 text-white">{state.title}</h2>}
            <p className="text-sm text-zinc-300 mb-4 whitespace-pre-wrap">{state.message}</p>
            {isPrompt && (
              <input
                type="text"
                autoFocus
                value={inputVal}
                onChange={e => setInputVal(e.target.value)}
                onKeyDown={e => e.key === "Enter" && state.onConfirm(inputVal)}
                className="w-full border border-zinc-600 rounded px-3 py-1.5 text-sm bg-zinc-900 text-white focus:outline-none focus:ring-1 focus:ring-red-500 mb-4"
              />
            )}
            <div className="flex justify-end gap-2">
              {(isConfirm || isPrompt) && (
                <button onClick={state.onCancel}
                  className="px-4 py-1.5 border border-zinc-600 rounded text-sm text-zinc-300 hover:border-zinc-400 transition-colors">
                  Cancel
                </button>
              )}
              <button
                onClick={() => isPrompt ? state.onConfirm(inputVal) : state.onConfirm()}
                className="px-4 py-1.5 bg-red-600 text-white rounded text-sm hover:bg-red-700 transition-colors font-medium">
                OK
              </button>
            </div>
          </div>
        </div>
      );
    }

    function Toast({ id, message, variant, onDone }) {
      useEffect(() => {
        const t = setTimeout(onDone, 2500);
        return () => clearTimeout(t);
      }, [id]);
      const cls = variant === "error"
        ? "bg-red-950 border-red-800 text-red-300"
        : "bg-zinc-800 border-zinc-600 text-white";
      return (
        <div className={`fixed bottom-5 right-5 z-50 text-sm px-4 py-2.5 rounded-lg shadow-2xl border ${cls}`}>
          {message}
        </div>
      );
    }

    function App() {
      const [state, dispatch] = useReducer(reducer, undefined, loadInitialState);
      const { circuitName, circuitNumber, trackLength, segments, autoAdjust, errors, loadModalOpen, loadedFileName, needsTrackLength, sectorsEnabled, s1, s2 } = state;
      // ids: Set of segment _ids to flash; tick increments on every move to restart animation even for same segment
      const [moveAnim, setMoveAnim] = useState({ ids: new Set(), tick: 0 });
      const [offset, setOffset] = useState(0);
      const [headerCollapsed, setHeaderCollapsed] = useState(false);
      const segmentRefs = useRef({});
      const lastErrorIdRef = useRef(null);
      const modalIdRef = useRef(0);
      const [modalState, setModalState] = useState(null);
      const [toast, setToast] = useState(null);

      const showAlert = (message, title) => new Promise(resolve => {
        setModalState({ id: ++modalIdRef.current, type: "alert", title, message,
          onConfirm: () => { setModalState(null); resolve(); }
        });
      });
      const showConfirm = (message) => new Promise(resolve => {
        setModalState({ id: ++modalIdRef.current, type: "confirm", message,
          onConfirm: () => { setModalState(null); resolve(true); },
          onCancel: () => { setModalState(null); resolve(false); }
        });
      });
      const showPrompt = (message, defaultValue = "") => new Promise(resolve => {
        setModalState({ id: ++modalIdRef.current, type: "prompt", message, defaultValue,
          onConfirm: (val) => { setModalState(null); resolve(val); },
          onCancel: () => { setModalState(null); resolve(null); }
        });
      });
      const showToast = (message, variant = "success") => {
        setToast({ id: ++modalIdRef.current, message, variant });
      };

      const sectorErrors = validateSectors(sectorsEnabled, s1, s2, trackLength);
      const hasSectorErrors = Object.keys(sectorErrors).length > 0;
      const totalErrorCount = Object.keys(errors).length;
      const errorSegmentIds = segments
        .filter(seg => Object.keys(errors[seg._id] || {}).length > 0)
        .map(seg => seg._id);

      useEffect(() => {
        try {
          const snapshot = { circuitName, circuitNumber, trackLength, segments, autoAdjust, sectorsEnabled, s1, s2 };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
        } catch (err) {
          console.warn("Failed to persist editor state:", err);
        }
      }, [circuitName, circuitNumber, trackLength, segments, autoAdjust, sectorsEnabled, s1, s2]);

      useEffect(() => {
        if (!needsTrackLength) return;
        dispatch({ type: "CLEAR_NEEDS_TRACK_LENGTH" });
        showPrompt("This track does not have a track length defined.\nPlease enter the total track length in meters.").then(val => {
          if (val !== null) {
            const num = Number(val);
            if (num > 0) dispatch({ type: "SET_TRACK_LENGTH", value: String(num) });
          }
        });
      }, [needsTrackLength]);

      useEffect(() => {
        const validIds = new Set(segments.map(seg => seg._id));
        Object.keys(segmentRefs.current).forEach(id => {
          if (!validIds.has(id)) delete segmentRefs.current[id];
        });
        if (lastErrorIdRef.current && !validIds.has(lastErrorIdRef.current)) {
          lastErrorIdRef.current = null;
        }
      }, [segments]);

      // Wraps dispatch to trigger move animation on both the moved and displaced segment
      const dispatchWithAnim = (action) => {
        if (action.type === "MOVE_UP" || action.type === "MOVE_DOWN") {
          const idx = segments.findIndex(s => s._id === action.id);
          const displaced = action.type === "MOVE_UP" ? segments[idx - 1] : segments[idx + 1];
          const ids = new Set([action.id, displaced?._id].filter(Boolean));
          dispatch(action);
          setMoveAnim(prev => ({ ids, tick: prev.tick + 1 }));
        } else {
          dispatch(action);
        }
      };

      const handleGoToNextError = () => {
        if (errorSegmentIds.length === 0) return;
        const currentIdx = errorSegmentIds.indexOf(lastErrorIdRef.current);
        const nextId = errorSegmentIds[(currentIdx + 1) % errorSegmentIds.length];
        lastErrorIdRef.current = nextId;
        const node = segmentRefs.current[nextId];
        if (node) node.scrollIntoView({ behavior: "smooth", block: "center" });
      };

      const trackLengthNum = Number(trackLength);
      const trackLengthValid = trackLength !== "" && !isNaN(trackLengthNum) && trackLengthNum > 0;

      const handleCopyJSON = async () => {
        if (!circuitName.trim() || circuitNumber === "") {
          await showAlert("circuit_name and circuit_number are required.");
          return;
        }
        if (!trackLengthValid) {
          await showAlert("A valid track length (> 0) is required before copying JSON.");
          return;
        }
        if (hasSectorErrors) {
          await showAlert("Sector boundaries have validation errors. Please fix them before copying JSON.");
          return;
        }
        const payload = {
          circuit_name: circuitName.trim(),
          circuit_number: Number(circuitNumber),
          track_length: trackLengthNum,
          segments: segments.map(exportSegment),
        };
        if (sectorsEnabled) {
          payload.sectors = { s1: Number(s1), s2: Number(s2) };
        }
        try {
          await navigator.clipboard.writeText(JSON.stringify(payload, null, 2));
          showToast("JSON copied to clipboard!");
        } catch {
          showToast("Failed to copy to clipboard.", "error");
        }
      };

      const handleNew = async () => {
        if (segments.length > 0 && !await showConfirm("Start fresh? Unsaved changes will be lost.")) return;
        dispatch({ type: "NEW" });
      };

      const handleGenerateReverse = async () => {
        if (!trackLengthValid) {
          await showAlert("Track length must be defined before generating a reverse track.");
          return;
        }
        if (!await showConfirm("This will create a new track with reversed segment positions and order. Continue?")) return;

        const newName = await showPrompt("Enter circuit_name for the reversed track:");
        if (newName === null || !newName.trim()) return;

        const newNumberStr = await showPrompt("Enter circuit_number for the reversed track:");
        if (newNumberStr === null) return;
        const newNumber = Number(newNumberStr);
        if (isNaN(newNumber)) { await showAlert("Invalid circuit_number."); return; }

        const trackData = {
          circuit_name: circuitName,
          circuit_number: Number(circuitNumber),
          track_length: trackLengthNum,
          segments: segments.map(exportSegment),
        };

        let reversed;
        try {
          reversed = generateReverseTrack(trackData, newName.trim(), newNumber);
        } catch (err) {
          await showAlert("Cannot generate reverse track: " + err.message);
          return;
        }

        await showAlert("Segment names may not be semantically correct in reverse direction. Please review.");
        dispatch({ type: "LOAD_JSON", data: reversed, fileName: "" });
      };

      const handleSave = async () => {
        if (!circuitName.trim() || circuitNumber === "") {
          await showAlert("circuit_name and circuit_number are required before saving.");
          return;
        }
        if (!trackLengthValid) {
          await showAlert("A valid track length (> 0) is required before saving.");
          return;
        }
        if (hasSectorErrors) {
          await showAlert("Sector boundaries have validation errors. Please fix them before saving.");
          return;
        }
        if (totalErrorCount > 0) {
          if (!await showConfirm(`There are ${totalErrorCount} segment(s) with validation errors. Export anyway?`)) return;
        }
        const payload = {
          circuit_name: circuitName.trim(),
          circuit_number: Number(circuitNumber),
          track_length: trackLengthNum,
          segments: segments.map(exportSegment),
        };
        if (sectorsEnabled) {
          payload.sectors = { s1: Number(s1), s2: Number(s2) };
        }
        const defaultName = loadedFileName || `${circuitName.trim().replace(/\s+/g, "_")}.json`;
        const chosenName = await showPrompt("Save as:", defaultName);
        if (!chosenName) return;
        const finalName = chosenName.endsWith(".json") ? chosenName : chosenName + ".json";
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = finalName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const handleApplyOffset = async () => {
        if (!trackLengthValid) { await showAlert("Track length must be defined to apply offset."); return; }
        if (offset === 0) return;
        if (!await showConfirm(`Apply offset of ${offset}m to all segments? This will modify all start_m / end_m values and cannot be undone.`)) return;
        dispatch({ type: "APPLY_OFFSET", offset, trackLen: trackLengthNum });
        setOffset(0);
      };

      return (
        <div className="min-h-screen bg-black">
          {/* ── Header ── */}
          <header
            className="sticky top-0 z-20 border-b border-zinc-800 shadow-lg"
            style={{ backgroundColor: "#0d0d0d", borderTop: "3px solid #dc2626" }}
          >
            <div className="max-w-3xl mx-auto px-4 py-2">

              {/* Title + actions row */}
              <div className="flex flex-wrap items-center gap-3 mb-2">
                <div className="flex items-center gap-1.5 mr-1">
                  <div>
                    <h1 className="font-bold text-white text-base leading-tight">Track Segment Editor</h1>
                    <p className="text-xs text-red-500 font-semibold tracking-widest uppercase">Pits n' Giggles</p>
                  </div>
                  <button
                    onClick={() => setHeaderCollapsed(c => !c)}
                    className="self-start mt-0.5 text-zinc-600 hover:text-zinc-300 transition-colors border border-zinc-700 rounded-full w-5 h-5 flex items-center justify-center"
                    title={headerCollapsed ? "Expand header" : "Collapse header"}
                  >
                    <i className={`bi ${headerCollapsed ? "bi-chevron-down" : "bi-chevron-up"} text-xs`} />
                  </button>
                </div>

                <div className="flex flex-wrap items-center gap-2">
                  <button
                    onClick={handleNew}
                    className="px-3 py-1.5 border border-zinc-700 rounded text-sm text-zinc-300 hover:border-zinc-400 hover:text-white transition-colors"
                  >
                    New
                  </button>
                  <button
                    onClick={() => dispatch({ type: "OPEN_LOAD_MODAL" })}
                    className="px-3 py-1.5 border border-zinc-700 rounded text-sm text-zinc-300 hover:border-zinc-400 hover:text-white transition-colors"
                  >
                    Load JSON
                  </button>
                  <button
                    onClick={handleCopyJSON}
                    className="px-3 py-1.5 border border-zinc-700 rounded text-sm text-zinc-300 hover:border-zinc-400 hover:text-white transition-colors"
                  >
                    Copy JSON
                  </button>
                  <button
                    onClick={handleGenerateReverse}
                    className="px-3 py-1.5 border border-zinc-700 rounded text-sm text-zinc-300 hover:border-red-600 hover:text-red-400 transition-colors"
                  >
                    Generate Reverse Track
                  </button>
                  <button
                    onClick={handleSave}
                    className="px-3 py-1.5 bg-red-600 text-white rounded text-sm hover:bg-red-700 transition-colors font-semibold"
                  >
                    Download JSON
                  </button>
                  <label className="flex items-center gap-1.5 text-sm text-zinc-400 cursor-pointer select-none ml-1">
                    <input
                      type="checkbox"
                      checked={autoAdjust}
                      onChange={() => dispatch({ type: "TOGGLE_AUTO_ADJUST" })}
                      className="accent-red-600"
                    />
                    Auto-adjust
                    <span className="text-xs text-zinc-600">(end_m → next start_m)</span>
                  </label>
                </div>
              </div>

              {/* Circuit fields + offset — collapsible */}
              {!headerCollapsed && (
                <div className="header-fields-enter">
                  <div className="flex flex-wrap gap-3 items-start">
                    <div className="flex items-center gap-2">
                      <label className="text-sm text-zinc-400 whitespace-nowrap">
                        circuit_name <span className="text-red-500">*</span>
                      </label>
                      <input
                        type="text"
                        value={circuitName}
                        onChange={e => dispatch({ type: "SET_CIRCUIT_NAME", value: e.target.value })}
                        className="border border-zinc-600 rounded px-2 py-1 text-sm bg-zinc-800 text-white w-40 focus:outline-none focus:ring-1 focus:ring-red-500 placeholder-zinc-600"
                        placeholder="e.g. Monza"
                      />
                    </div>
                    <div className="flex items-center gap-2">
                      <label className="text-sm text-zinc-400 whitespace-nowrap">
                        circuit_number <span className="text-red-500">*</span>
                      </label>
                      <input
                        type="number"
                        value={circuitNumber}
                        onChange={e => dispatch({ type: "SET_CIRCUIT_NUMBER", value: e.target.value })}
                        className="border border-zinc-600 rounded px-2 py-1 text-sm bg-zinc-800 text-white w-20 focus:outline-none focus:ring-1 focus:ring-red-500 placeholder-zinc-600"
                        placeholder="e.g. 1"
                      />
                    </div>
                    <div className="flex items-center gap-2">
                      <label className="text-sm text-zinc-400 whitespace-nowrap">
                        track_length (m) <span className="text-red-500">*</span>
                      </label>
                      <div>
                        <input
                          type="number"
                          value={trackLength}
                          onChange={e => dispatch({ type: "SET_TRACK_LENGTH", value: e.target.value })}
                          className={`border rounded px-2 py-1 text-sm bg-zinc-800 text-white w-24 focus:outline-none focus:ring-1 focus:ring-red-500 placeholder-zinc-600 ${!trackLengthValid && trackLength !== "" ? "border-red-500" : "border-zinc-600"}`}
                          placeholder="e.g. 5793"
                          min="0"
                          step="any"
                        />
                        {!trackLengthValid && trackLength !== "" && (
                          <p className="text-xs text-red-400 mt-0.5">Must be &gt; 0</p>
                        )}
                      </div>
                    </div>
                  </div>

                  {/* Sectors */}
                  <div className="flex flex-wrap items-center gap-3 mt-3 pt-2 border-t border-zinc-800">
                    <label className="flex items-center gap-1.5 text-sm cursor-pointer select-none">
                      <input
                        type="checkbox"
                        checked={sectorsEnabled}
                        onChange={e => dispatch({ type: "SET_SECTORS_ENABLED", value: e.target.checked })}
                        className="accent-red-600"
                      />
                      <span className="text-zinc-300 font-medium">Sectors</span>
                      <span className="text-xs text-zinc-600">(optional)</span>
                    </label>
                    {sectorsEnabled && (
                      <>
                        <div className="flex items-center gap-1.5">
                          <label className="text-sm text-zinc-400 whitespace-nowrap">S1 boundary (m)</label>
                          <div>
                            <input
                              type="number"
                              value={s1}
                              step="1"
                              onChange={e => dispatch({ type: "SET_S1", value: e.target.value })}
                              className={`border rounded px-2 py-1 text-sm bg-zinc-800 text-white w-24 focus:outline-none focus:ring-1 focus:ring-red-500 placeholder-zinc-600 ${sectorErrors.s1 ? "border-red-500" : "border-zinc-600"}`}
                              placeholder="e.g. 1800"
                            />
                            {sectorErrors.s1 && <p className="text-xs text-red-400 mt-0.5">{sectorErrors.s1}</p>}
                          </div>
                        </div>
                        <div className="flex items-center gap-1.5">
                          <label className="text-sm text-zinc-400 whitespace-nowrap">S2 boundary (m)</label>
                          <div>
                            <input
                              type="number"
                              value={s2}
                              step="1"
                              onChange={e => dispatch({ type: "SET_S2", value: e.target.value })}
                              className={`border rounded px-2 py-1 text-sm bg-zinc-800 text-white w-24 focus:outline-none focus:ring-1 focus:ring-red-500 placeholder-zinc-600 ${sectorErrors.s2 ? "border-red-500" : "border-zinc-600"}`}
                              placeholder="e.g. 3600"
                            />
                            {sectorErrors.s2 && <p className="text-xs text-red-400 mt-0.5">{sectorErrors.s2}</p>}
                          </div>
                        </div>
                      </>
                    )}
                  </div>

                  {/* Offset control */}
                  {segments.length > 0 && (
                    <div className="flex flex-wrap items-center gap-2 mt-3 pt-2 border-t border-zinc-800">
                      <span className="text-sm text-zinc-400 whitespace-nowrap">Offset (m)</span>
                      <div className="flex items-center gap-1">
                        {[-50, -10].map(d => (
                          <button key={d}
                            onClick={() => setOffset(o => o + d)}
                            className="px-2 py-1 border border-zinc-700 rounded text-xs text-zinc-400 hover:border-amber-600 hover:text-amber-400 transition-colors font-mono"
                          >{d}</button>
                        ))}
                        <input
                          type="number"
                          value={offset}
                          step="any"
                          onChange={e => setOffset(Number(e.target.value))}
                          className="border border-zinc-600 rounded px-2 py-1 text-sm bg-zinc-800 text-white w-24 focus:outline-none focus:ring-1 focus:ring-amber-500 text-center font-mono"
                        />
                        {[10, 50].map(d => (
                          <button key={d}
                            onClick={() => setOffset(o => o + d)}
                            className="px-2 py-1 border border-zinc-700 rounded text-xs text-zinc-400 hover:border-amber-600 hover:text-amber-400 transition-colors font-mono"
                          >+{d}</button>
                        ))}
                      </div>
                      <button
                        onClick={() => setOffset(0)}
                        disabled={offset === 0}
                        className="px-2.5 py-1 border border-zinc-700 rounded text-xs text-zinc-400 hover:border-zinc-500 hover:text-zinc-300 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                      >
                        Reset
                      </button>
                      {offset !== 0 && (
                        <>
                          <span className="text-xs text-amber-500 font-medium">Preview active ({offset > 0 ? "+" : ""}{offset}m)</span>
                          <button
                            onClick={handleApplyOffset}
                            className="px-2.5 py-1 border border-amber-700 rounded text-xs text-amber-400 hover:bg-amber-950 transition-colors font-medium"
                          >
                            Apply Permanently
                          </button>
                        </>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Global error banner */}
            {totalErrorCount > 0 && (
              <div className="bg-red-950 border-t border-red-900 px-4 py-1.5 text-sm text-red-400 font-medium text-center">
                {totalErrorCount} segment{totalErrorCount > 1 ? "s" : ""} with errors
              </div>
            )}
          </header>

          {/* ── Segment list ── */}
          <main className="max-w-3xl mx-auto px-4 py-6">
            {segments.length === 0 ? (
              <div className="text-center py-20 text-zinc-500">
                <p className="text-2xl mb-2 text-zinc-300">No segments</p>
                <p className="text-sm mb-6">Load a JSON file or create a new segment to get started.</p>
                <button
                  onClick={() => dispatch({ type: "ADD_FIRST" })}
                  className="px-5 py-2.5 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors text-sm font-medium"
                >
                  + Add First Segment
                </button>
              </div>
            ) : (
              <>
                {/* Total count header — indented to align with cards */}
                <div className="flex items-center gap-2 mb-4">
                  <div className="w-8 flex-shrink-0" />
                  <p className="text-sm text-zinc-500">
                    Total:{" "}
                    <span className="text-white font-semibold text-base">{segments.length}</span>
                    {" "}segment{segments.length > 1 ? "s" : ""}
                    {totalErrorCount === 0 && (
                      <span className="ml-2 text-green-500 font-medium">✓ All valid</span>
                    )}
                  </p>
                  <button
                    onClick={handleGoToNextError}
                    disabled={totalErrorCount === 0}
                    className="px-2.5 py-1 border border-zinc-700 rounded text-xs text-zinc-400 hover:border-red-600 hover:text-red-400 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                  >
                    Go to Next Error
                  </button>
                </div>

                {segments.map((seg, i) => (
                  <SegmentCard
                    key={seg._id}
                    seg={seg}
                    segNum={i + 1}
                    index={i}
                    total={segments.length}
                    errors={errors}
                    dispatch={dispatchWithAnim}
                    animTick={moveAnim.ids.has(seg._id) ? moveAnim.tick : 0}
                    offset={offset}
                    trackLengthNum={trackLengthNum}
                    cardRef={el => {
                      if (el) segmentRefs.current[seg._id] = el;
                      else delete segmentRefs.current[seg._id];
                    }}
                  />
                ))}

                {/* Add at end — aligned with cards */}
                <div className="flex items-start gap-2 mt-2">
                  <div className="w-8 flex-shrink-0" />
                  <button
                    onClick={() => dispatch({ type: "ADD_LAST" })}
                    className="flex-1 py-3 border-2 border-dashed border-zinc-700 rounded-lg text-zinc-500 hover:border-red-600 hover:text-red-500 transition-colors text-sm"
                  >
                    + Add Segment at End
                  </button>
                </div>
              </>
            )}
          </main>

          {loadModalOpen && <LoadModal dispatch={dispatch} />}
          <AppModal state={modalState} />
          {toast && <Toast key={toast.id} id={toast.id} message={toast.message} variant={toast.variant} onDone={() => setToast(null)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
