<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Segment Editor – Pits n' Giggles</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes segbounce {
      0%   { transform: scale(1.04);  box-shadow: 0 0 0 2px #ef4444, 0 0 40px rgba(239,68,68,0.7); }
      45%  { transform: scale(1.018); box-shadow: 0 0 0 2px #ef4444, 0 0 20px rgba(239,68,68,0.4); }
      100% { transform: scale(1);     box-shadow: 0 0 0 0 transparent; }
    }
    @keyframes segflash {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }
    .seg-moving {
      animation: segbounce 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }
    .seg-flash-overlay {
      background: linear-gradient(135deg, rgba(220,38,38,0.4) 0%, rgba(220,38,38,0.18) 100%);
      animation: segflash 0.75s ease-out forwards;
    }
  </style>
</head>
<body class="bg-black text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useReducer, useRef, useEffect } = React;

    // ─── Helpers ────────────────────────────────────────────────────────────────

    let _counter = 0;
    function makeId() { return `seg_${++_counter}_${Math.random().toString(36).slice(2,7)}`; }

    function makeSegment(prevEndM = 0, type = "straight") {
      return {
        _id: makeId(),
        type,
        name: "",
        start_m: prevEndM,
        end_m: prevEndM + 100,
        corner_number: "",
        corner_numbers_raw: "",
      };
    }

    function parseCornerNumbers(raw) {
      return raw.split(",").map(s => s.trim()).filter(s => s !== "").map(Number);
    }

    // ─── Validation ─────────────────────────────────────────────────────────────

    function validate(segments) {
      const errors = {};
      segments.forEach((seg, i) => {
        const e = {};
        if ((seg.type === "straight" || seg.type === "complex_corner") && !seg.name.trim()) {
          e.name = "Required";
        }
        if (seg.start_m === "" || isNaN(Number(seg.start_m))) e.start_m = "Required";
        if (seg.end_m   === "" || isNaN(Number(seg.end_m)))   e.end_m   = "Required";
        if (!e.start_m && !e.end_m && Number(seg.start_m) >= Number(seg.end_m)) {
          e.end_m = "Must be greater than start_m";
        }
        if (seg.type === "corner" && (seg.corner_number === "" || isNaN(Number(seg.corner_number)))) {
          e.corner_number = "Required";
        }
        if (seg.type === "complex_corner") {
          const nums = parseCornerNumbers(seg.corner_numbers_raw);
          if (nums.length === 0)                                      e.corner_numbers = "Required, non-empty";
          else if (nums.some(n => !Number.isInteger(n) || isNaN(n))) e.corner_numbers = "All values must be integers";
        }
        if (i > 0 && !e.start_m) {
          const prev = segments[i - 1];
          if (prev.end_m !== "" && !isNaN(Number(prev.end_m)) && Number(seg.start_m) < Number(prev.end_m)) {
            e.start_m = `Overlaps previous segment (prev end: ${prev.end_m})`;
          }
        }
        if (Object.keys(e).length > 0) errors[seg._id] = e;
      });
      return errors;
    }

    // ─── Export / Import ─────────────────────────────────────────────────────────

    function exportSegment(seg) {
      const out = { type: seg.type, start_m: Number(seg.start_m), end_m: Number(seg.end_m) };
      if (seg.type === "straight") out.name = seg.name.trim();
      if (seg.type === "corner") {
        out.name = seg.name.trim();
        out.corner_number = Number(seg.corner_number);
      }
      if (seg.type === "complex_corner") {
        out.name = seg.name.trim();
        out.corner_numbers = parseCornerNumbers(seg.corner_numbers_raw);
      }
      return out;
    }

    function importSegment(seg) {
      return {
        _id: makeId(),
        type: seg.type,
        name: seg.name || "",
        start_m: seg.start_m ?? "",
        end_m: seg.end_m ?? "",
        corner_number: seg.corner_number ?? "",
        corner_numbers_raw: Array.isArray(seg.corner_numbers) ? seg.corner_numbers.join(", ") : "",
      };
    }

    function validateLoadedData(data) {
      if (typeof data !== "object" || data === null) return "Root must be an object";
      if (typeof data.circuit_name !== "string" || !data.circuit_name.trim()) return "circuit_name must be a non-empty string";
      if (typeof data.circuit_number !== "number") return "circuit_number must be a number";
      if (!Array.isArray(data.segments)) return "segments must be an array";
      for (let i = 0; i < data.segments.length; i++) {
        const s = data.segments[i];
        if (!["straight", "corner", "complex_corner"].includes(s.type)) {
          return `Segment ${i}: unknown type "${s.type}"`;
        }
      }
      return null;
    }

    const STORAGE_KEY = "track-segment-editor.state.v1";

    function normalizePersistedSegment(seg) {
      const type = ["straight", "corner", "complex_corner"].includes(seg?.type) ? seg.type : "straight";
      return {
        _id: typeof seg?._id === "string" && seg._id ? seg._id : makeId(),
        type,
        name: typeof seg?.name === "string" ? seg.name : "",
        start_m: seg?.start_m ?? "",
        end_m: seg?.end_m ?? "",
        corner_number: seg?.corner_number ?? "",
        corner_numbers_raw: typeof seg?.corner_numbers_raw === "string" ? seg.corner_numbers_raw : "",
      };
    }

    function syncIdCounter(segments) {
      const maxCounter = segments.reduce((max, seg) => {
        const m = /^seg_(\d+)_/.exec(String(seg._id || ""));
        if (!m) return max;
        const n = Number(m[1]);
        return Number.isFinite(n) ? Math.max(max, n) : max;
      }, 0);
      if (maxCounter > _counter) _counter = maxCounter;
    }

    // ─── Reducer ─────────────────────────────────────────────────────────────────

    const initialState = {
      circuitName: "",
      circuitNumber: "",
      segments: [],
      autoAdjust: false,
      errors: {},
      loadModalOpen: false,
      loadedFileName: "",
    };

    function loadInitialState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return initialState;
        const parsed = JSON.parse(raw);
        if (typeof parsed !== "object" || parsed === null) return initialState;

        const segments = Array.isArray(parsed.segments)
          ? parsed.segments.map(normalizePersistedSegment)
          : [];

        syncIdCounter(segments);

        return {
          ...initialState,
          circuitName: typeof parsed.circuitName === "string" ? parsed.circuitName : "",
          circuitNumber: (typeof parsed.circuitNumber === "string" || typeof parsed.circuitNumber === "number")
            ? parsed.circuitNumber
            : "",
          segments,
          autoAdjust: typeof parsed.autoAdjust === "boolean" ? parsed.autoAdjust : false,
          errors: validate(segments),
        };
      } catch (err) {
        console.warn("Failed to restore saved editor state:", err);
        return initialState;
      }
    }

    function reducer(state, action) {
      let segments = state.segments;
      switch (action.type) {
        case "SET_CIRCUIT_NAME":
          return { ...state, circuitName: action.value };
        case "SET_CIRCUIT_NUMBER":
          return { ...state, circuitNumber: action.value };
        case "TOGGLE_AUTO_ADJUST":
          return { ...state, autoAdjust: !state.autoAdjust };

        case "UPDATE_SEGMENT": {
          const { id, field, value } = action;
          let updated = segments.map(s => s._id === id ? { ...s, [field]: value } : s);
          if (state.autoAdjust && field === "end_m" && value !== "") {
            const idx = updated.findIndex(s => s._id === id);
            if (idx !== -1 && idx < updated.length - 1) {
              updated = updated.map((s, i) => i === idx + 1 ? { ...s, start_m: value } : s);
            }
          }
          return { ...state, segments: updated, errors: validate(updated) };
        }

        case "CHANGE_TYPE": {
          const updated = segments.map(s => s._id !== action.id ? s : {
            _id: s._id, type: action.newType, name: s.name,
            start_m: s.start_m, end_m: s.end_m, corner_number: "", corner_numbers_raw: "",
          });
          return { ...state, segments: updated, errors: validate(updated) };
        }

        case "INSERT_ABOVE": {
          const idx = segments.findIndex(s => s._id === action.id);
          if (idx === -1) return state;
          const prevEndM = idx > 0 ? (Number(segments[idx-1].end_m) || 0) : 0;
          const updated = [...segments.slice(0, idx), makeSegment(prevEndM), ...segments.slice(idx)];
          return { ...state, segments: updated, errors: validate(updated) };
        }

        case "INSERT_BELOW": {
          const idx = segments.findIndex(s => s._id === action.id);
          if (idx === -1) return state;
          const updated = [...segments.slice(0, idx+1), makeSegment(Number(segments[idx].end_m)||0), ...segments.slice(idx+1)];
          return { ...state, segments: updated, errors: validate(updated) };
        }

        case "ADD_FIRST": {
          const newSeg = makeSegment(0);
          return { ...state, segments: [newSeg], errors: validate([newSeg]) };
        }

        case "ADD_LAST": {
          const last = segments[segments.length - 1];
          const newSeg = makeSegment(last ? (Number(last.end_m) || 0) : 0);
          const updated = [...segments, newSeg];
          return { ...state, segments: updated, errors: validate(updated) };
        }

        case "MOVE_UP": {
          const idx = segments.findIndex(s => s._id === action.id);
          if (idx <= 0) return state;
          const updated = [...segments];
          [updated[idx-1], updated[idx]] = [updated[idx], updated[idx-1]];
          return { ...state, segments: updated, errors: validate(updated) };
        }

        case "MOVE_DOWN": {
          const idx = segments.findIndex(s => s._id === action.id);
          if (idx === -1 || idx >= segments.length - 1) return state;
          const updated = [...segments];
          [updated[idx], updated[idx+1]] = [updated[idx+1], updated[idx]];
          return { ...state, segments: updated, errors: validate(updated) };
        }

        case "DELETE": {
          const updated = segments.filter(s => s._id !== action.id);
          return { ...state, segments: updated, errors: validate(updated) };
        }

        case "LOAD_JSON": {
          const loaded = action.data.segments.map(importSegment);
          return {
            ...state,
            circuitName: action.data.circuit_name,
            circuitNumber: action.data.circuit_number,
            segments: loaded,
            errors: validate(loaded),
            loadModalOpen: false,
            loadedFileName: action.fileName || "",
          };
        }

        case "NEW":
          return { ...initialState };

        case "OPEN_LOAD_MODAL":
          return { ...state, loadModalOpen: true };

        case "CLOSE_LOAD_MODAL":
          return { ...state, loadModalOpen: false };

        default:
          return state;
      }
    }

    // ─── Components ──────────────────────────────────────────────────────────────

    function FieldError({ msg }) {
      if (!msg) return null;
      return <p className="text-xs text-red-400 mt-0.5">{msg}</p>;
    }

    function inputCls(hasError) {
      return `w-full border rounded px-2 py-1 text-sm bg-zinc-800 text-white placeholder-zinc-500 focus:outline-none focus:ring-1 ${
        hasError ? "border-red-500 focus:ring-red-500" : "border-zinc-600 focus:ring-red-500"
      }`;
    }

    function TypeSpecificFields({ seg, errors, dispatch }) {
      if (seg.type === "corner") {
        return (
          <div className="mt-3">
            <label className="block text-xs font-medium text-zinc-400 mb-0.5">
              corner_number <span className="text-red-500">*</span>
            </label>
            <input
              type="number"
              value={seg.corner_number}
              className={inputCls(!!errors.corner_number) + " w-32"}
              onChange={e => dispatch({ type: "UPDATE_SEGMENT", id: seg._id, field: "corner_number", value: e.target.value })}
            />
            <FieldError msg={errors.corner_number} />
          </div>
        );
      }

      if (seg.type === "complex_corner") {
        const nums = parseCornerNumbers(seg.corner_numbers_raw);
        const preview = seg.name.trim() && nums.length > 0
          ? `${seg.name.trim()} (T${nums[0]}–T${nums[nums.length-1]})`
          : null;
        return (
          <div className="mt-3">
            <label className="block text-xs font-medium text-zinc-400 mb-0.5">
              corner_numbers <span className="text-red-500">*</span>{" "}
              <span className="font-normal text-zinc-500">(comma-separated integers, e.g. 5,6,7)</span>
            </label>
            <input
              type="text"
              value={seg.corner_numbers_raw}
              placeholder="5,6,7"
              className={inputCls(!!errors.corner_numbers)}
              onChange={e => dispatch({ type: "UPDATE_SEGMENT", id: seg._id, field: "corner_numbers_raw", value: e.target.value })}
            />
            <FieldError msg={errors.corner_numbers} />
            {nums.length > 0 && !errors.corner_numbers && (
              <div className="flex flex-wrap gap-1 mt-1.5">
                {nums.map((n, i) => (
                  <span key={i} className="bg-red-950 text-red-300 text-xs px-2 py-0.5 rounded-full border border-red-800">
                    T{n}
                  </span>
                ))}
              </div>
            )}
            {preview && <p className="text-xs text-zinc-500 italic mt-1">{preview}</p>}
          </div>
        );
      }

      return null;
    }

    function SegmentCard({ seg, segNum, index, total, errors, dispatch, animTick, cardRef }) {
      const e = errors[seg._id] || {};
      const hasError = Object.keys(e).length > 0;
      const isMoving = animTick > 0;

      return (
        <div ref={cardRef} className="flex items-start gap-2 mb-3">
          {/* Segment number */}
          <div className="flex-shrink-0 w-8 pt-4 text-right">
            <span className="text-zinc-600 text-xs font-mono font-bold">{String(segNum).padStart(2, "0")}</span>
          </div>

          {/* Card */}
          <div
            className={`relative flex-1 rounded-lg border-l-4 overflow-hidden ${isMoving ? "seg-moving" : ""} ${
              hasError ? "border-red-500" : "border-zinc-700"
            }`}
            style={{ backgroundColor: "#1a1a1a" }}
          >
            {/* Flash overlay — keyed by animTick so it remounts (restarts) on every move */}
            {isMoving && (
              <div key={animTick} className="seg-flash-overlay absolute inset-0 pointer-events-none z-10 rounded-lg" />
            )}
            <div className="p-4">
              {/* Top row: type + name + error badge + delete */}
              <div className="flex gap-2 items-start mb-3">
                <div className="flex-shrink-0">
                  <label className="block text-xs font-medium text-zinc-400 mb-0.5">Type</label>
                  <select
                    value={seg.type}
                    className="border border-zinc-600 rounded px-2 py-1 text-sm bg-zinc-800 text-white focus:outline-none focus:ring-1 focus:ring-red-500"
                    onChange={e => dispatch({ type: "CHANGE_TYPE", id: seg._id, newType: e.target.value })}
                  >
                    <option value="straight">straight</option>
                    <option value="corner">corner</option>
                    <option value="complex_corner">complex_corner</option>
                  </select>
                </div>

                <div className="flex-1">
                  <label className="block text-xs font-medium text-zinc-400 mb-0.5">
                    Name{" "}
                    {seg.type === "corner"
                      ? <span className="font-normal text-zinc-500">(optional)</span>
                      : <span className="text-red-500">*</span>
                    }
                  </label>
                  <input
                    type="text"
                    value={seg.name}
                    className={inputCls(!!e.name)}
                    onChange={ev => dispatch({ type: "UPDATE_SEGMENT", id: seg._id, field: "name", value: ev.target.value })}
                  />
                  <FieldError msg={e.name} />
                </div>

                <div className="flex-shrink-0 flex items-center gap-1 pt-5">
                  {hasError && (
                    <span className="text-xs bg-red-950 text-red-400 px-1.5 py-0.5 rounded-full font-medium border border-red-800">
                      {Object.keys(e).length} err{Object.keys(e).length > 1 ? "s" : ""}
                    </span>
                  )}
                  <button
                    onClick={() => dispatch({ type: "DELETE", id: seg._id })}
                    className="text-zinc-500 hover:text-red-500 transition-colors text-xl leading-none font-bold ml-1"
                    title="Delete segment"
                  >
                    ×
                  </button>
                </div>
              </div>

              {/* Range fields */}
              <div className="grid grid-cols-2 gap-3 mb-1">
                <div>
                  <label className="block text-xs font-medium text-zinc-400 mb-0.5">
                    start_m <span className="text-red-500">*</span>
                  </label>
                  <input
                    type="number"
                    value={seg.start_m}
                    className={inputCls(!!e.start_m)}
                    onChange={ev => dispatch({ type: "UPDATE_SEGMENT", id: seg._id, field: "start_m", value: ev.target.value })}
                  />
                  <FieldError msg={e.start_m} />
                </div>
                <div>
                  <label className="block text-xs font-medium text-zinc-400 mb-0.5">
                    end_m <span className="text-red-500">*</span>
                  </label>
                  <input
                    type="number"
                    value={seg.end_m}
                    className={inputCls(!!e.end_m)}
                    onChange={ev => dispatch({ type: "UPDATE_SEGMENT", id: seg._id, field: "end_m", value: ev.target.value })}
                  />
                  <FieldError msg={e.end_m} />
                </div>
              </div>

              <TypeSpecificFields seg={seg} errors={e} dispatch={dispatch} />
            </div>

            {/* Card footer */}
            <div
              className="border-t px-4 py-2 flex gap-1.5 flex-wrap text-xs"
              style={{ borderColor: "#2a2a2a", backgroundColor: "#141414" }}
            >
              <button
                onClick={() => dispatch({ type: "MOVE_UP", id: seg._id })}
                disabled={index === 0}
                className="px-2.5 py-1 border border-zinc-700 rounded text-zinc-400 hover:border-red-600 hover:text-red-400 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                title="Move up"
              >
                ↑ Up
              </button>
              <button
                onClick={() => dispatch({ type: "MOVE_DOWN", id: seg._id })}
                disabled={index === total - 1}
                className="px-2.5 py-1 border border-zinc-700 rounded text-zinc-400 hover:border-red-600 hover:text-red-400 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                title="Move down"
              >
                ↓ Down
              </button>
              <span className="border-l border-zinc-700 mx-0.5" />
              <button
                onClick={() => dispatch({ type: "INSERT_ABOVE", id: seg._id })}
                className="px-2.5 py-1 border border-zinc-700 text-zinc-400 rounded hover:border-red-600 hover:text-red-400 transition-colors"
                title="Insert above"
              >
                + Above
              </button>
              <button
                onClick={() => dispatch({ type: "INSERT_BELOW", id: seg._id })}
                className="px-2.5 py-1 border border-zinc-700 text-zinc-400 rounded hover:border-red-600 hover:text-red-400 transition-colors"
                title="Insert below"
              >
                + Below
              </button>
            </div>
          </div>
        </div>
      );
    }

    function LoadModal({ dispatch }) {
      const [text, setText] = useState("");
      const [error, setError] = useState("");
      const fileRef = useRef(null);

      const tryLoad = (jsonStr, fileName = "") => {
        setError("");
        let data;
        try { data = JSON.parse(jsonStr); }
        catch (ex) { setError("Invalid JSON: " + ex.message); return; }
        const err = validateLoadedData(data);
        if (err) { setError(err); return; }
        dispatch({ type: "LOAD_JSON", data, fileName });
      };

      const handleFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => tryLoad(ev.target.result, file.name);
        reader.readAsText(file);
      };

      return (
        <div
          className="fixed inset-0 bg-black/75 flex items-center justify-center z-50"
          onClick={() => dispatch({ type: "CLOSE_LOAD_MODAL" })}
        >
          <div
            className="rounded-xl shadow-2xl p-6 w-full max-w-lg mx-4 border border-zinc-700"
            style={{ backgroundColor: "#1a1a1a" }}
            onClick={e => e.stopPropagation()}
          >
            <h2 className="text-lg font-semibold mb-4 text-white">Load JSON</h2>

            <div className="mb-4">
              <label className="block text-sm text-zinc-400 mb-1">Upload file</label>
              <input
                type="file"
                accept=".json,application/json"
                ref={fileRef}
                onChange={handleFile}
                className="text-sm text-zinc-400"
              />
            </div>

            <div className="mb-4">
              <label className="block text-sm text-zinc-400 mb-1">Or paste JSON</label>
              <textarea
                value={text}
                onChange={e => { setText(e.target.value); setError(""); }}
                rows={8}
                spellCheck={false}
                className="w-full border border-zinc-600 rounded px-3 py-2 text-sm font-mono bg-zinc-900 text-white placeholder-zinc-600 focus:outline-none focus:ring-1 focus:ring-red-500"
                placeholder={'{"circuit_name": "Monza", "circuit_number": 1, "segments": [...]}'}
              />
            </div>

            {error && (
              <div className="mb-3 text-sm text-red-400 bg-red-950 border border-red-800 rounded px-3 py-2">
                {error}
              </div>
            )}

            <div className="flex justify-end gap-2">
              <button
                onClick={() => dispatch({ type: "CLOSE_LOAD_MODAL" })}
                className="px-4 py-2 border border-zinc-600 rounded text-sm text-zinc-300 hover:border-zinc-400 transition-colors"
              >
                Cancel
              </button>
              <button
                onClick={() => tryLoad(text)}
                className="px-4 py-2 bg-red-600 text-white rounded text-sm hover:bg-red-700 transition-colors font-medium"
              >
                Load
              </button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [state, dispatch] = useReducer(reducer, undefined, loadInitialState);
      const { circuitName, circuitNumber, segments, autoAdjust, errors, loadModalOpen, loadedFileName } = state;
      // ids: Set of segment _ids to flash; tick increments on every move to restart animation even for same segment
      const [moveAnim, setMoveAnim] = useState({ ids: new Set(), tick: 0 });
      const segmentRefs = useRef({});
      const lastErrorIdRef = useRef(null);

      const totalErrorCount = Object.keys(errors).length;
      const errorSegmentIds = segments
        .filter(seg => Object.keys(errors[seg._id] || {}).length > 0)
        .map(seg => seg._id);

      useEffect(() => {
        try {
          const snapshot = { circuitName, circuitNumber, segments, autoAdjust };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
        } catch (err) {
          console.warn("Failed to persist editor state:", err);
        }
      }, [circuitName, circuitNumber, segments, autoAdjust]);

      useEffect(() => {
        const validIds = new Set(segments.map(seg => seg._id));
        Object.keys(segmentRefs.current).forEach(id => {
          if (!validIds.has(id)) delete segmentRefs.current[id];
        });
        if (lastErrorIdRef.current && !validIds.has(lastErrorIdRef.current)) {
          lastErrorIdRef.current = null;
        }
      }, [segments]);

      // Wraps dispatch to trigger move animation on both the moved and displaced segment
      const dispatchWithAnim = (action) => {
        if (action.type === "MOVE_UP" || action.type === "MOVE_DOWN") {
          const idx = segments.findIndex(s => s._id === action.id);
          const displaced = action.type === "MOVE_UP" ? segments[idx - 1] : segments[idx + 1];
          const ids = new Set([action.id, displaced?._id].filter(Boolean));
          dispatch(action);
          setMoveAnim(prev => ({ ids, tick: prev.tick + 1 }));
        } else {
          dispatch(action);
        }
      };

      const handleGoToNextError = () => {
        if (errorSegmentIds.length === 0) return;
        const currentIdx = errorSegmentIds.indexOf(lastErrorIdRef.current);
        const nextId = errorSegmentIds[(currentIdx + 1) % errorSegmentIds.length];
        lastErrorIdRef.current = nextId;
        const node = segmentRefs.current[nextId];
        if (node) node.scrollIntoView({ behavior: "smooth", block: "center" });
      };

      const handleNew = () => {
        if (segments.length > 0 && !confirm("Start fresh? Unsaved changes will be lost.")) return;
        dispatch({ type: "NEW" });
      };

      const handleSave = () => {
        if (!circuitName.trim() || circuitNumber === "") {
          alert("circuit_name and circuit_number are required before saving.");
          return;
        }
        if (totalErrorCount > 0) {
          if (!confirm(`There are ${totalErrorCount} segment(s) with validation errors. Export anyway?`)) return;
        }
        const payload = {
          circuit_name: circuitName.trim(),
          circuit_number: Number(circuitNumber),
          segments: segments.map(exportSegment),
        };
        const defaultName = loadedFileName || `${circuitName.trim().replace(/\s+/g, "_")}.json`;
        const chosenName = prompt("Save as:", defaultName);
        if (!chosenName) return;
        const finalName = chosenName.endsWith(".json") ? chosenName : chosenName + ".json";
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = finalName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      return (
        <div className="min-h-screen bg-black">
          {/* ── Header ── */}
          <header
            className="sticky top-0 z-20 border-b border-zinc-800 shadow-lg"
            style={{ backgroundColor: "#0d0d0d", borderTop: "3px solid #dc2626" }}
          >
            <div className="max-w-3xl mx-auto px-4 py-3">
              {/* Title + actions row */}
              <div className="flex flex-wrap items-center gap-3 mb-3">
                <div className="mr-1">
                  <h1 className="font-bold text-white text-base leading-tight">Track Segment Editor</h1>
                  <p className="text-xs text-red-500 font-semibold tracking-widest uppercase">Pits n' Giggles</p>
                </div>

                <div className="flex gap-2">
                  <button
                    onClick={handleNew}
                    className="px-3 py-1.5 border border-zinc-700 rounded text-sm text-zinc-300 hover:border-zinc-400 hover:text-white transition-colors"
                  >
                    New
                  </button>
                  <button
                    onClick={() => dispatch({ type: "OPEN_LOAD_MODAL" })}
                    className="px-3 py-1.5 border border-zinc-700 rounded text-sm text-zinc-300 hover:border-zinc-400 hover:text-white transition-colors"
                  >
                    Load JSON
                  </button>
                  <button
                    onClick={handleSave}
                    className="px-3 py-1.5 bg-red-600 text-white rounded text-sm hover:bg-red-700 transition-colors font-semibold"
                  >
                    Save / Download JSON
                  </button>
                </div>

                <label className="flex items-center gap-1.5 text-sm text-zinc-400 cursor-pointer ml-auto select-none">
                  <input
                    type="checkbox"
                    checked={autoAdjust}
                    onChange={() => dispatch({ type: "TOGGLE_AUTO_ADJUST" })}
                    className="accent-red-600"
                  />
                  Auto-adjust
                  <span className="text-xs text-zinc-600">(end_m → next start_m)</span>
                </label>
              </div>

              {/* Circuit fields row */}
              <div className="flex flex-wrap gap-5">
                <div className="flex items-center gap-2">
                  <label className="text-sm text-zinc-400 whitespace-nowrap">
                    circuit_name <span className="text-red-500">*</span>
                  </label>
                  <input
                    type="text"
                    value={circuitName}
                    onChange={e => dispatch({ type: "SET_CIRCUIT_NAME", value: e.target.value })}
                    className="border border-zinc-600 rounded px-2 py-1 text-sm bg-zinc-800 text-white w-44 focus:outline-none focus:ring-1 focus:ring-red-500 placeholder-zinc-600"
                    placeholder="e.g. Monza"
                  />
                </div>
                <div className="flex items-center gap-2">
                  <label className="text-sm text-zinc-400 whitespace-nowrap">
                    circuit_number <span className="text-red-500">*</span>
                  </label>
                  <input
                    type="number"
                    value={circuitNumber}
                    onChange={e => dispatch({ type: "SET_CIRCUIT_NUMBER", value: e.target.value })}
                    className="border border-zinc-600 rounded px-2 py-1 text-sm bg-zinc-800 text-white w-24 focus:outline-none focus:ring-1 focus:ring-red-500 placeholder-zinc-600"
                    placeholder="e.g. 1"
                  />
                </div>
              </div>
            </div>

            {/* Global error banner */}
            {totalErrorCount > 0 && (
              <div className="bg-red-950 border-t border-red-900 px-4 py-1.5 text-sm text-red-400 font-medium text-center">
                {totalErrorCount} segment{totalErrorCount > 1 ? "s" : ""} with errors
              </div>
            )}
          </header>

          {/* ── Segment list ── */}
          <main className="max-w-3xl mx-auto px-4 py-6">
            {segments.length === 0 ? (
              <div className="text-center py-20 text-zinc-500">
                <p className="text-2xl mb-2 text-zinc-300">No segments</p>
                <p className="text-sm mb-6">Load a JSON file or create a new segment to get started.</p>
                <button
                  onClick={() => dispatch({ type: "ADD_FIRST" })}
                  className="px-5 py-2.5 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors text-sm font-medium"
                >
                  + Add First Segment
                </button>
              </div>
            ) : (
              <>
                {/* Total count header — indented to align with cards */}
                <div className="flex items-center gap-2 mb-4">
                  <div className="w-8 flex-shrink-0" />
                  <p className="text-sm text-zinc-500">
                    Total:{" "}
                    <span className="text-white font-semibold text-base">{segments.length}</span>
                    {" "}segment{segments.length > 1 ? "s" : ""}
                    {totalErrorCount === 0 && (
                      <span className="ml-2 text-green-500 font-medium">✓ All valid</span>
                    )}
                  </p>
                  <button
                    onClick={handleGoToNextError}
                    disabled={totalErrorCount === 0}
                    className="px-2.5 py-1 border border-zinc-700 rounded text-xs text-zinc-400 hover:border-red-600 hover:text-red-400 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                  >
                    Go to Next Error
                  </button>
                </div>

                {segments.map((seg, i) => (
                  <SegmentCard
                    key={seg._id}
                    seg={seg}
                    segNum={i + 1}
                    index={i}
                    total={segments.length}
                    errors={errors}
                    dispatch={dispatchWithAnim}
                    animTick={moveAnim.ids.has(seg._id) ? moveAnim.tick : 0}
                    cardRef={el => {
                      if (el) segmentRefs.current[seg._id] = el;
                      else delete segmentRefs.current[seg._id];
                    }}
                  />
                ))}

                {/* Add at end — aligned with cards */}
                <div className="flex items-start gap-2 mt-2">
                  <div className="w-8 flex-shrink-0" />
                  <button
                    onClick={() => dispatch({ type: "ADD_LAST" })}
                    className="flex-1 py-3 border-2 border-dashed border-zinc-700 rounded-lg text-zinc-500 hover:border-red-600 hover:text-red-500 transition-colors text-sm"
                  >
                    + Add Segment at End
                  </button>
                </div>
              </>
            )}
          </main>

          {loadModalOpen && <LoadModal dispatch={dispatch} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
